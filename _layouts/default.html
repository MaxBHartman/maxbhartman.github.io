<!-- _layouts/default.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
</head>
<body>

  <!-- Main Wrapper -->
  <div class="container">
    
    <!-- Left Sidebar -->
    <aside class="sidebar">
      <img src="{{ site.logo }}" alt="Max Hartman" class="profile-pic">
      <p class="contact-info">
        Contact: <a href="mailto:max@example.com">max@example.com</a><br>
        GitHub: <a href="https://github.com/{{ site.social_media.github }}">{{ site.social_media.github }}</a><br>
        LinkedIn: <a href="https://linkedin.com/in/{{ site.social_media.linkedin }}">{{ site.social_media.linkedin }}</a><br>
        <a href="#">CV</a> | <a href="#">Transcript</a>
      </p>
      <p class="news">
        <strong>News</strong><br>
        2024-09-27: Launched new project on Protein-Protein Interaction Predictions.
      </p>
    </aside>

    <!-- Main Content Area -->
    <main class="content">
      {{ content }}
    </main>

  </div>

</body>
</html>
