<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
</head>
<body>

  <!-- Header with logo and title -->
  <header>
    <img src="{{ site.logo }}" alt="Logo">
    <h1>{{ site.title }}</h1>
  </header>

  <!-- Navigation Links -->
  <nav>
    <ul>
      <li><a href="{{ '/' | relative_url }}">Home</a></li>
      <li><a href="{{ '/about' | relative_url }}">About</a></li>
      <li><a href="{{ '/projects' | relative_url }}">Projects</a></li>
      <li><a href="{{ '/publications' | relative_url }}">Publications</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main>
    {{ content }}
  </main>

  <!-- Footer with Social Media Links -->
  <footer>
    <p>&copy; {{ site.time | date: '%Y' }} Max Hartman</p>
    <ul>
      <li><a href="https://github.com/{{ site.social_media.github }}">GitHub</a></li>
      <li><a href="https://linkedin.com/in/{{ site.social_media.linkedin }}">LinkedIn</a></li>
    </ul>
  </footer>

</body>
</html>
